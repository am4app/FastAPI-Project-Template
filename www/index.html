<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Page</title>
</head>
<body>
    <h1>Hello world!!</h1>
    <p>This page has been loaded <span id="counter-value">...</span> time(s).</p>

    <script>
        const fetchAndDisplayCounter = async () => {
            const counterValueSpan = document.getElementById('counter-value');
            counterValueSpan.textContent = 'Loading...';

            try {
                const response = await fetch('/api/counter');
                const data = await response.json();
                counterValueSpan.textContent = data.count;
            } catch (error) {
                console.error('Error fetching counter:', error);
                counterValueSpan.textContent = 'Error fetching count.';
            }
        };

        document.addEventListener('DOMContentLoaded', fetchAndDisplayCounter);
    </script>
</body>
</html>
